name: Deploy to cPanel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          port: 21098
          local_path: './*'
          remote_path: '/home/${{ secrets.FTP_USER }}/public_html/'
          sftp_only: true
          exclude: '.git*,.github/*,docs/*,Dockerfile,docker-compose.yml,docker-entrypoint.sh,.dockerignore,README.md,.env'
